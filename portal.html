<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Client Portal — Palisade One</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --black: #03050A; --deep: #070C14; --surface: #0B1220;
      --border: #112240; --accent: #00FFD1; --accent2: #0084FF;
      --danger: #FF3B5C; --text: #C8D8F0; --muted: #4A6080; --white: #F0F6FF;
    }
    html, body { height: 100%; }
    body { background: var(--black); color: var(--text); font-family: 'Outfit', sans-serif; font-weight: 300; overflow: hidden; cursor: none; display: flex; align-items: center; justify-content: center; }
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-thumb { background: var(--accent); }

    .cursor { width:8px;height:8px;background:var(--accent);border-radius:50%;position:fixed;pointer-events:none;z-index:99999;transition:transform 0.1s ease;mix-blend-mode:screen; }
    .cursor-ring { width:32px;height:32px;border:1px solid var(--accent);border-radius:50%;position:fixed;pointer-events:none;z-index:99998;transition:all 0.15s ease;opacity:0.5; }

    .portal-bg {
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 60% 60% at 20% 50%, rgba(0,255,209,0.04) 0%, transparent 60%),
        radial-gradient(ellipse 50% 50% at 80% 30%, rgba(0,132,255,0.05) 0%, transparent 50%),
        radial-gradient(ellipse 40% 70% at 60% 80%, rgba(255,59,92,0.03) 0%, transparent 50%);
    }

    .grid-overlay {
      position: fixed; inset: 0;
      background-image: linear-gradient(rgba(0,255,209,0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(0,255,209,0.02) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse at center, black 20%, transparent 80%);
    }

    /* SCANLINE */
    @keyframes scanline { from { top: -2px; } to { top: 100%; } }
    .scanline-wrap { position: fixed; inset: 0; overflow: hidden; pointer-events: none; }
    .scanline { position: absolute; left: 0; right: 0; height: 2px; background: linear-gradient(to bottom, transparent, rgba(0,255,209,0.04), transparent); animation: scanline 10s linear infinite; }

    .portal-wrap {
      position: relative; z-index: 10;
      width: 100%; max-width: 440px;
      padding: 24px;
    }

    .portal-header {
      text-align: center;
      margin-bottom: 40px;
    }

    .portal-logo {
      display: inline-flex; align-items: center; gap: 12px;
      text-decoration: none; margin-bottom: 32px;
    }

    .logo-mark { width: 40px; height: 40px; }
    .logo-mark svg { width: 100%; height: 100%; }

    .logo-text {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 24px; letter-spacing: 3px; color: var(--white);
    }
    .logo-text span { color: var(--accent); }

    .portal-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 32px; color: var(--white); letter-spacing: 2px;
      margin-bottom: 8px;
    }

    .portal-sub {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px; color: var(--muted); letter-spacing: 2px;
    }

    /* STATUS BAR */
    .status-bar {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      margin-bottom: 32px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px; color: var(--accent);
      letter-spacing: 2px;
    }

    .status-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.4} }

    .portal-box {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 40px;
      position: relative;
      overflow: hidden;
      clip-path: polygon(0 0, calc(100% - 16px) 0, 100% 16px, 100% 100%, 16px 100%, 0 calc(100% - 16px));
    }

    .portal-box::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--accent), transparent);
    }

    .form-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }

    .form-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px; color: var(--muted);
      letter-spacing: 2px; text-transform: uppercase;
    }

    .form-input {
      background: var(--deep); border: 1px solid var(--border);
      color: var(--white); padding: 14px 16px;
      font-family: 'Outfit', sans-serif; font-size: 14px;
      outline: none; transition: border-color 0.2s; width: 100%;
    }

    .form-input:focus { border-color: var(--accent); }
    .form-input::placeholder { color: var(--muted); }

    .form-input[type="password"] { letter-spacing: 3px; }
    .form-input[type="password"]::placeholder { letter-spacing: 0; }

    .forgot-link {
      text-align: right;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px; color: var(--muted);
      text-decoration: none; letter-spacing: 1px;
      transition: color 0.2s; display: block; margin-top: -8px; margin-bottom: 24px;
    }
    .forgot-link:hover { color: var(--accent); }

    .login-btn {
      width: 100%; background: var(--accent); color: var(--black);
      border: none; padding: 16px;
      font-family: 'Outfit', sans-serif; font-size: 13px;
      font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
      cursor: none; transition: all 0.2s;
      clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 10px 100%, 0 calc(100% - 10px));
    }

    .login-btn:hover { background: var(--white); transform: translateY(-2px); box-shadow: 0 20px 40px rgba(0,255,209,0.2); }

    .divider { display: flex; align-items: center; gap: 16px; margin: 24px 0; }
    .divider-line { flex: 1; height: 1px; background: var(--border); }
    .divider-text { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--muted); letter-spacing: 1px; white-space: nowrap; }

    .sso-btn {
      width: 100%; background: transparent; border: 1px solid var(--border);
      color: var(--text); padding: 14px;
      font-family: 'Outfit', sans-serif; font-size: 13px; font-weight: 500;
      letter-spacing: 1px; cursor: none; transition: all 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 10px;
    }
    .sso-btn:hover { border-color: var(--accent2); color: var(--accent2); }

    .portal-footer-links {
      text-align: center; margin-top: 24px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px; color: var(--muted);
      display: flex; gap: 24px; justify-content: center;
    }
    .portal-footer-links a { color: var(--muted); text-decoration: none; transition: color 0.2s; letter-spacing: 1px; }
    .portal-footer-links a:hover { color: var(--accent); }

    .back-home {
      display: flex; align-items: center; gap: 8px; justify-content: center;
      margin-top: 20px; text-decoration: none;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px; color: var(--muted); letter-spacing: 2px;
      transition: color 0.2s;
    }
    .back-home:hover { color: var(--accent); }

    /* ERROR STATE */
    .error-msg {
      background: rgba(255,59,92,0.08); border: 1px solid rgba(255,59,92,0.3);
      color: var(--danger); padding: 12px 16px;
      font-family: 'JetBrains Mono', monospace; font-size: 11px;
      letter-spacing: 1px; margin-bottom: 16px; display: none;
    }

    /* THEME TOGGLE */
    .theme-toggle-btn { position: fixed; top: 20px; right: 20px; z-index: 100; background: rgba(11,18,32,0.7); border: 1px solid var(--border); color: var(--muted); width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; cursor: none; font-size: 16px; transition: all 0.2s; backdrop-filter: blur(10px); }
    .theme-toggle-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* LIGHT MODE */
    html[data-theme="light"] {
      --black: #EEF2F7; --deep: #E3EAF2; --surface: #FFFFFF;
      --border: #CBD8E8; --accent: #008F7E; --accent2: #0070CC;
      --danger: #D42B47; --text: #1E2E3D; --muted: #5A7A9A; --white: #0A1828;
    }
    html[data-theme="light"] body { background: var(--black); }
    html[data-theme="light"] .portal-bg { background: radial-gradient(ellipse 60% 60% at 20% 50%, rgba(0,143,126,0.06) 0%, transparent 60%), radial-gradient(ellipse 50% 50% at 80% 30%, rgba(0,112,204,0.07) 0%, transparent 50%); }
    html[data-theme="light"] .grid-overlay { background-image: linear-gradient(rgba(0,143,126,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(0,143,126,0.04) 1px, transparent 1px); }
    html[data-theme="light"] .portal-box { background: var(--surface); border-color: var(--border); }
    html[data-theme="light"] .form-input { background: var(--deep); color: var(--text); }
    html[data-theme="light"] .theme-toggle-btn { background: rgba(238,242,247,0.8); }
    html[data-theme="light"] .sso-btn { color: var(--text); }
    html[data-theme="light"] .scanline { display: none; }

    /* MOBILE */
    @media (max-width: 480px) {
      body { cursor: auto; overflow: auto; align-items: flex-start; padding-top: 60px; }
      .cursor, .cursor-ring { display: none; }
      .portal-box { padding: 28px 20px; }
    }
  </style>
</head>
<body>
  <button class="theme-toggle-btn" id="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme"><span id="theme-icon">☀</span></button>
  <div class="cursor" id="cursor"></div>
  <div class="cursor-ring" id="cursorRing"></div>
  <div class="portal-bg"></div>
  <div class="grid-overlay"></div>
  <div class="scanline-wrap"><div class="scanline"></div></div>

  <div class="portal-wrap">
    <div class="portal-header">
      <a href="index.html" class="portal-logo">
        <div class="logo-mark">
          <svg viewBox="0 0 36 36" fill="none">
            <polygon points="18,2 34,10 34,26 18,34 2,26 2,10" stroke="#00FFD1" stroke-width="1.5" fill="rgba(0,255,209,0.05)"/>
            <polygon points="18,8 28,13 28,23 18,28 8,23 8,13" stroke="#00FFD1" stroke-width="1" fill="rgba(0,255,209,0.08)" opacity="0.6"/>
            <circle cx="18" cy="18" r="3" fill="#00FFD1"/>
          </svg>
        </div>
        <span class="logo-text">PALISADE<span>ONE</span></span>
      </a>
      <div class="status-bar">
        <div class="status-dot"></div>
        ALL SYSTEMS OPERATIONAL
      </div>
      <div class="portal-title">CLIENT PORTAL</div>
      <div class="portal-sub">SECURE ACCESS — AUTHENTICATED SESSION REQUIRED</div>
    </div>

    <div class="portal-box">
      <div class="error-msg" id="errorMsg">⚠ Invalid credentials. Please try again.</div>

      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" class="form-input" id="loginEmail" placeholder="you@company.com" autocomplete="email">
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" class="form-input" id="loginPassword" placeholder="••••••••••••" autocomplete="current-password">
      </div>

      <a href="#" class="forgot-link">Forgot password?</a>

      <button class="login-btn" onclick="handleLogin()">
        Access Portal →
      </button>

      <div class="divider">
        <div class="divider-line"></div>
        <div class="divider-text">OR CONTINUE WITH</div>
        <div class="divider-line"></div>
      </div>

      <button class="sso-btn" onclick="handleSSO()">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <rect x="1" y="1" width="6" height="6" fill="#0084FF"/>
          <rect x="9" y="1" width="6" height="6" fill="#00FFD1"/>
          <rect x="1" y="9" width="6" height="6" fill="#FF3B5C"/>
          <rect x="9" y="9" width="6" height="6" fill="#F5A623"/>
        </svg>
        Sign in with Microsoft 365
      </button>
    </div>

    <div class="portal-footer-links">
      <a href="contact.html">Get Support</a>
      <a href="contact.html">New Client?</a>
      <a href="#">Privacy Policy</a>
    </div>

    <a href="index.html" class="back-home">← Back to palisadeone.com</a>
  </div>

  <script>
    (function() { document.documentElement.setAttribute('data-theme', localStorage.getItem('p1-theme') || 'dark'); })();
    function applyTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      localStorage.setItem('p1-theme', theme);
      const icon = document.getElementById('theme-icon');
      if (icon) icon.textContent = theme === 'light' ? '☽' : '☀';
    }
    function toggleTheme() {
      applyTheme((document.documentElement.getAttribute('data-theme') || 'dark') === 'dark' ? 'light' : 'dark');
    }
    document.addEventListener('DOMContentLoaded', () => {
      const icon = document.getElementById('theme-icon');
      if (icon) icon.textContent = (localStorage.getItem('p1-theme') || 'dark') === 'light' ? '☽' : '☀';
    });

    // Cursor
    const cursor = document.getElementById('cursor');
    const ring = document.getElementById('cursorRing');
    let mouseX = 0, mouseY = 0, ringX = 0, ringY = 0;
    document.addEventListener('mousemove', e => {
      mouseX = e.clientX; mouseY = e.clientY;
      cursor.style.left = mouseX - 4 + 'px';
      cursor.style.top = mouseY - 4 + 'px';
    });
    function animateRing() {
      ringX += (mouseX - ringX - 16) * 0.12;
      ringY += (mouseY - ringY - 16) * 0.12;
      ring.style.left = ringX + 'px'; ring.style.top = ringY + 'px';
      requestAnimationFrame(animateRing);
    }
    animateRing();

    // Enter key
    document.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });

const API_URL = 'https://api.palisadeone.com:9443';

async function handleLogin() {
  const email = document.getElementById('loginEmail').value;
  const pass = document.getElementById('loginPassword').value;
  const err = document.getElementById('errorMsg');
  const btn = document.querySelector('.login-btn');
  if (!email || !pass) { err.style.display = 'block'; err.textContent = '!! Please enter your email and password.'; return; }
  err.style.display = 'none';
  btn.textContent = 'AUTHENTICATING...';
  btn.disabled = true;
  try {
    const res = await fetch(API_URL + '/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password: pass })
    });
    const data = await res.json();
    if (!res.ok) {
      err.style.display = 'block';
      err.textContent = '!! ' + (data.error || 'Invalid credentials. Please try again.');
      document.getElementById('loginPassword').value = '';
      btn.textContent = 'Access Portal \u2192';
      btn.disabled = false;
      return;
    }
    // Store auth token and user info
    sessionStorage.setItem('p1_auth', 'true');
    sessionStorage.setItem('p1_token', data.token);
    sessionStorage.setItem('p1_user', JSON.stringify(data.user));
    if (data.client) sessionStorage.setItem('p1_client', JSON.stringify(data.client));
    // Route based on role
    window.location.href = data.redirect || (data.user.role === 'admin' ? 'dashboard.html' : 'client-portal.html');
  } catch(e) {
    err.style.display = 'block';
    err.textContent = '!! Connection error. Please try again.';
    btn.textContent = 'Access Portal \u2192';
    btn.disabled = false;
  }
}

    function handleSSO() {
      alert('Microsoft 365 SSO integration coming soon!');
    }
  </script>
</body>
</html>
